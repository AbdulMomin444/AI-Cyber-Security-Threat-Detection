<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cyber Security Dashboard - Phase 3</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ================= GLOBAL ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at top, #020617, #010409 65%);
    color:#e2e8f0;
    overflow-x:hidden;
}

/* Cyber background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size:40px 40px;
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    padding:30px;
}

/* ================= HEADER ================= */
.hero{
    text-align:center;
    margin-bottom:30px;
}

.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:40px;
    color:#38bdf8;
    text-shadow:0 0 20px rgba(56,189,248,0.35);
}

.hero p{
    color:#64748b;
    margin-top:8px;
    font-size:14px;
}

/* ================= STATS ================= */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(15,23,42,0.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(56,189,248,0.08);
    border-radius:16px;
    padding:22px;
    text-align:center;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
    transition:all .3s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 18px 50px rgba(0,0,0,0.7);
}

.card span{
    display:block;
    color:#94a3b8;
    font-size:14px;
    margin-bottom:8px;
}

.card b{
    font-size:28px;
    color:#38bdf8;
}

/* ================= ANALYTICS ================= */
.analytics-card{
    background:rgba(15,23,42,0.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(56,189,248,0.08);
    border-radius:16px;
    padding:24px;
    margin-bottom:30px;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
}

.analytics-card h3{
    color:#38bdf8;
    font-family:'Orbitron',sans-serif;
    margin-bottom:20px;
}

#attackChart{
    max-height:300px;
}

/* ================= FILTER BAR ================= */
.filter-bar{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:25px;
}

.filter-bar input,
.filter-bar select{
    flex:1;
    min-width:180px;
    padding:14px 16px;
    border-radius:12px;
    border:1px solid rgba(56,189,248,0.12);
    background:rgba(15,23,42,0.7);
    color:#e2e8f0;
    outline:none;
    font-size:14px;
}

.filter-bar button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:#fff;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.filter-bar button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(56,189,248,0.3);
}

/* ================= TABLE ================= */
.table-container{
    background:rgba(15,23,42,0.6);
    backdrop-filter:blur(14px);
    border:1px solid rgba(56,189,248,0.08);
    border-radius:16px;
    overflow:auto;
    box-shadow:0 12px 40px rgba(0,0,0,0.5);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1200px;
}

th{
    background:#020617;
    color:#38bdf8;
    padding:16px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
}

td{
    padding:16px;
    text-align:center;
    font-family:'Share Tech Mono',monospace;
    font-size:12px;
    color:#94a3b8;
    border-bottom:1px solid rgba(255,255,255,0.04);
}

tr:hover{
    background:rgba(56,189,248,0.05);
}

td:nth-child(2),
td:nth-child(3){
    color:#e2e8f0;
}

/* ================= STATUS ================= */
.status{
    padding:6px 14px;
    border-radius:20px;
    font-size:11px;
    font-weight:600;
}

.normal{
    background:rgba(34,197,94,0.1);
    color:#22c55e;
}

.anomaly{
    background:rgba(239,68,68,0.1);
    color:#ef4444;
}

.low{color:#22c55e;}
.high{color:#f59e0b;}
.critical{
    color:#ef4444;
    font-weight:bold;
}

.attack{
    color:#38bdf8;
    font-weight:600;
}

.explain{
    max-width:260px;
    color:#94a3b8;
    font-size:11px;
}

.location{
    color:#38bdf8;
}

.anomaly-row{
    border-left:3px solid #ef4444;
    background:rgba(239,68,68,0.03);
}

/* ================= RESPONSIVE ================= */
@media(max-width:1024px){
    .stats{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:768px){
    .stats{
        grid-template-columns:1fr;
    }

    .container{
        padding:16px;
    }

    .hero h1{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="hero">
        <h1>🚀 AI Cyber Security Dashboard</h1>
        <p>AI Powered Threat Detection System - Phase 3</p>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="card">
            <span>Total Logs</span>
            <b id="totalLogs">0</b>
        </div>

        <div class="card">
            <span>Alerts</span>
            <b id="alertsCount">0</b>
        </div>

        <div class="card">
            <span>Blocked</span>
            <b id="blockedCount">0</b>
        </div>

        <div class="card">
            <span>Sources</span>
            <b id="sourceCount">0</b>
        </div>
    </div>

    <!-- ANALYTICS -->
    <div class="analytics-card">
        <h3>Threat Analytics</h3>
        <canvas id="attackChart"></canvas>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="Search IP / attack / location...">

        <select id="statusFilter">
            <option value="">All Status</option>
            <option value="Normal">Normal</option>
            <option value="Anomaly">Anomaly</option>
        </select>

        <select id="attackFilter">
            <option value="">All Attacks</option>
            <option value="Normal">Normal</option>
            <option value="DDoS">DDoS</option>
            <option value="Port Scan">Port Scan</option>
        </select>

        <button onclick="exportLogs()">Export CSV</button>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Source</th>
                    <th>Destination</th>
                    <th>Proto</th>
                    <th>Length</th>
                    <th>Status</th>
                    <th>Attack</th>
                    <th>Threat</th>
                    <th>Explanation</th>
                    <th>Location</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>
let attackChart = null;

/* ================= FETCH LOGS ================= */
async function fetchLogs() {
    const search = document.getElementById("searchInput").value;
    const status = document.getElementById("statusFilter").value;
    const attack = document.getElementById("attackFilter").value;

    const response = await fetch(
        `/logs?search=${encodeURIComponent(search)}&status=${encodeURIComponent(status)}&attack=${encodeURIComponent(attack)}`
    );

    const data = await response.json();

    const tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    const uniqueSources = new Set();
    let anomalyCount = 0;
    let blockedCount = 0;

    data.slice().reverse().forEach(log => {
        uniqueSources.add(log[1]);

        if (log[5] === "Anomaly") anomalyCount++;
        if ((log[7] || "").includes("Critical")) blockedCount++;

        let threatClass = "low";
        if ((log[7] || "").includes("Critical")) threatClass = "critical";
        else if ((log[7] || "").includes("High")) threatClass = "high";

        const row = `
            <tr class="${log[5] === "Anomaly" ? "anomaly-row" : ""}">
                <td>${log[0] || ""}</td>
                <td>${log[1] || ""}</td>
                <td>${log[2] || ""}</td>
                <td>${log[3] || ""}</td>
                <td>${log[4] || ""}</td>
                <td>
                    <span class="status ${log[5] === "Anomaly" ? "anomaly" : "normal"}">
                        ${log[5] || ""}
                    </span>
                </td>
                <td class="attack">${log[6] || ""}</td>
                <td class="${threatClass}">${log[7] || ""}</td>
                <td class="explain">${log[8] || ""}</td>
                <td class="location">${log[9] || ""}</td>
            </tr>
        `;

        tbody.innerHTML += row;
    });

    document.getElementById("totalLogs").textContent = data.length;
    document.getElementById("alertsCount").textContent = anomalyCount;
    document.getElementById("blockedCount").textContent = blockedCount;
    document.getElementById("sourceCount").textContent = uniqueSources.size;
}

/* ================= ANALYTICS ================= */
async function fetchAnalytics() {
    const response = await fetch("/analytics");
    const data = await response.json();

    const ctx = document.getElementById("attackChart").getContext("2d");

    if (attackChart) {
        attackChart.destroy();
    }

    attackChart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: data.attack_labels || [],
            datasets: [{
                label: "Detected Threats",
                data: data.attack_values || [],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: {
                        color: "#e2e8f0"
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        color: "#94a3b8"
                    }
                },
                y: {
                    beginAtZero: true,
                    ticks: {
                        color: "#94a3b8"
                    }
                }
            }
        }
    });
}

/* ================= EXPORT ================= */
function exportLogs() {
    window.location.href = "/export";
}

/* ================= REFRESH ================= */
function refreshDashboard() {
    fetchLogs();
    fetchAnalytics();
}

document.getElementById("searchInput").addEventListener("input", fetchLogs);
document.getElementById("statusFilter").addEventListener("change", fetchLogs);
document.getElementById("attackFilter").addEventListener("change", fetchLogs);

refreshDashboard();
setInterval(refreshDashboard, 3000);
</script>

</body>
</html>
